# 下载目录
dir=/home/sherlockguo/downloads/

# RPC 控制（供 Web UI 连接）
enable-rpc=true
rpc-listen-port=6800
rpc-secret=WeDownload2026!
rpc-allow-origin-all=true

# 连接优化（HTTP 多线程下载）
max-connection-per-server=16
split=16
min-split-size=1M
continue=true

# 其他
file-allocation=none
disk-cache=32M
check-certificate=false
quiet=false
