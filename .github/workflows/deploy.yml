name: Build

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Get version
        id: ver
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Package
        run: |
          mkdir -p pkg
          cp -r config scripts pkg/
          cp scripts/restart-n150.sh pkg/restart.sh
          echo "${{ steps.ver.outputs.sha }}" > pkg/.version
          tar -czf wedownload.tar.gz -C pkg .
          ls -lh wedownload.tar.gz

      - name: Upload Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.sha }}
          name: ${{ steps.ver.outputs.sha }}
          body: "Auto build ${{ steps.ver.outputs.sha }}"
          files: wedownload.tar.gz
          prerelease: true

      - name: Notify N150
        continue-on-error: true
        run: |
          curl -sS -X POST https://wemusic.sherlockguo.com/deploy \
            -H "Content-Type: application/json" \
            -d "{\"project\":\"wedownload\",\"version\":\"${{ steps.ver.outputs.sha }}\"}" \
            --max-time 10 --connect-timeout 5 || true
